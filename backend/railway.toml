# Railway: деплой папки backend через Dockerfile.
# В Dashboard: New Project → Deploy from GitHub → выберите репо, Root Directory = backend.
# Variables: OPENAI_API_KEY (обязательно для чата). QDRANT_LOCAL_PATH задаёт Dockerfile (/data/qdrant_storage);
# не переопределяйте пустой строкой. Для векторов между деплоями: Volume → /data.

[build]
builder = "DOCKERFILE"

[deploy]
# PORT Railway подставляет сам; в Dockerfile используется ${PORT:-8000}
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
